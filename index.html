<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://jzcfwfdcnfwgfttxhhwy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6Y2Z3ZmRjbmZ3Z2Z0dHhoaHd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjg1MDMsImV4cCI6MjA5NDcwNDUwM30.h160y8Fr1xbwQVygGZ4Il87cycatYedISwgxAZQZuGQ";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('currentTime').innerText = `hora ${hours}:${minutes}`;
    }

    async function fetchParkingStatus() {
        try {
            updateTime();

            const { data, error } = await supabaseClient
                .from('cajones_estado')
                .select('id, estado');

            if (error) throw error;
            if (!data || data.length === 0) return;

            data.forEach(slot => {
                const slotElement = document.getElementById(slot.id);
                
                if (slotElement) {
                    slotElement.classList.remove('libre', 'ocupado');
                    let carImg = slotElement.querySelector('.car-image');
                    
                    if (slot.estado === 'libre') {
                        slotElement.classList.add('libre');
                        if (carImg) {
                            carImg.remove();
                        }
                    } else if (slot.estado === 'ocupado') {
                        slotElement.classList.add('ocupado');
                        if (!carImg) {
                            carImg = document.createElement('img');
                            carImg.src = 'blue car-sin fondo.png';
                            carImg.classList.add('car-image');
                            slotElement.appendChild(carImg);
                        }
                    }
                }
            });

        } catch (err) {
            console.error("Error al obtener los datos de Supabase:", err.message);
        }
    }

    fetchParkingStatus();
    setInterval(fetchParkingStatus, 3000);
</script>

</body>
